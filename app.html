<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="supabase-url" content="YOUR_SUPABASE_URL"/>
<meta name="supabase-anon-key" content="YOUR_SUPABASE_ANON_KEY"/>
<title>Catcher.AI — Credit Repair</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<style>
:root{--bg:#0a1a0f;--bg2:#0f2318;--bg3:#142d1e;--border:rgba(49,166,104,.18);--text:#e8f5ee;--text2:#8aab96;--text3:#567063;--green:#31a668;--green2:#4cba7e;--sidebar:220px;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;display:flex}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center}
.logo-wrap span{font-size:18px;font-weight:800;color:var(--green)}
#nav-list{flex:1;overflow-y:auto;padding:10px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(49,166,104,.08);color:var(--text)}
.nav-item.active{background:rgba(49,166,104,.15);color:var(--green);font-weight:700}
.nav-item i{font-size:16px;width:20px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);padding:14px 12px 6px;text-transform:uppercase}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.8}
.sidebar-footer a{color:var(--green);text-decoration:none}
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
#topbar{height:56px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
#tb-title{font-weight:700;font-size:16px}
#tb-actions{display:flex;align-items:center;gap:10px}
#content{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card-title{font-weight:700;font-size:15px;margin-bottom:12px}
</style>

<style>
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{background:var(--green2);border-color:var(--green2)}
.btn-secondary{background:rgba(255,255,255,.04);border-color:var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.08)}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#ef4444}
.btn-danger:hover{background:#ef4444;color:#fff}
.btn-blue{background:#2563eb;border-color:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border .15s}
.input:focus{border-color:var(--green)}
textarea.input{resize:vertical;min-height:80px}
.label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:rgba(49,166,104,.05)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.badge-green{background:rgba(49,166,104,.12);color:var(--green);border-color:rgba(49,166,104,.25)}
.badge-blue{background:rgba(99,102,241,.12);color:#818cf8;border-color:rgba(99,102,241,.25)}
.badge-high{background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.25)}
.badge-resolved{background:rgba(16,185,129,.12);color:#10b981;border-color:rgba(16,185,129,.25)}
.badge-yellow{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.25)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7}
.spinner{border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state i{font-size:48px;opacity:.25;display:block;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;margin-bottom:20px;line-height:1.6}
#notif{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif-item{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;pointer-events:auto;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.notif-success{background:var(--green);color:#fff}
.notif-error{background:#ef4444;color:#fff}
.notif-warning{background:#f59e0b;color:#000}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.page-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.page-title{font-size:24px;font-weight:800}
.page-sub{font-size:14px;color:var(--text2);margin-top:4px}
pre{white-space:pre-wrap;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;line-height:1.8;color:var(--text2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
.stat-card{text-align:center;padding:24px}
.stat-num{font-size:32px;font-weight:800;color:var(--green)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(49,166,104,.08)}
tr:hover td{background:rgba(49,166,104,.03)}
.form-row{display:flex;gap:12px;margin-bottom:14px}
.form-row>*{flex:1}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.mt-12{margin-top:12px}
.mt-20{margin-top:20px}
</style>

</head>
<body>
<div id="app-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999">
<div style="text-align:center"><div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite"></div><div style="color:var(--text2);font-size:14px">Loading Catcher.AI...</div></div>
</div>
<div id="sidebar" style="display:none"></div>
<div id="main" style="display:none"><div id="topbar"></div><div id="content"></div></div>
<div id="notif"></div>
<div id="modal-root"></div>

<script>
(async function(){
'use strict';

// ─── BUREAU ADDRESSES (constant) ─────────────────────────────────────────────
const BUREAUS = {
  Equifax:{name:"Equifax Information Services LLC",street:"P.O. Box 740256",city:"Atlanta",state:"GA",zip:"30374"},
  Experian:{name:"Experian",street:"P.O. Box 4500",city:"Allen",state:"TX",zip:"75013"},
  TransUnion:{name:"TransUnion LLC Consumer Dispute Center",street:"P.O. Box 2000",city:"Chester",state:"PA",zip:"19016"}
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {
  view:'dashboard',
  profile:{},
  reports:[],
  analyses:[],
  disputes:[],
  letters:[],
  scores:[],
  addresses:[],
  loading:true,
  busy:false
};

// ─── AUTH CHECK ──────────────────────────────────────────────────────────────
const session = await window.cai.auth.requireAuth();
if(!session) return; // redirected to paywall

// ─── LOAD ALL DATA ───────────────────────────────────────────────────────────
async function loadAll(){
  try{
    const [profile,reports,analyses,disputes,letters,scores,addresses] = await Promise.all([
      window.cai.db.profiles.get().catch(()=>({})),
      window.cai.db.reports.list().catch(()=>[]),
      window.cai.db.analyses.list().catch(()=>[]),
      window.cai.db.disputes.list().catch(()=>[]),
      window.cai.db.letters.list().catch(()=>[]),
      window.cai.db.scores.list().catch(()=>[]),
      window.cai.db.addresses.list().catch(()=>[])
    ]);
    S.profile=profile||{};
    S.reports=reports||[];
    S.analyses=analyses||[];
    S.disputes=disputes||[];
    S.letters=letters||[];
    S.scores=scores||[];
    S.addresses=addresses||[];
  }catch(e){
    console.error('[cai] loadAll error:',e);
    notify('Failed to load data','error');
  }
  S.loading=false;
}

await loadAll();

// Hide loading, show app
document.getElementById('app-loading').style.display='none';
document.getElementById('sidebar').style.display='';
document.getElementById('main').style.display='';


// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
function notify(msg,type='success'){
  const el=document.createElement('div');
  el.className='notif-item notif-'+type;
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const NAV=[
  {section:'MAIN'},
  {id:'dashboard',icon:'ti-dashboard',label:'Dashboard'},
  {id:'analysis',icon:'ti-file-analytics',label:'Analysis'},
  {id:'disputes',icon:'ti-gavel',label:'Disputes'},
  {id:'letters',icon:'ti-mail',label:'Letters'},
  {section:'TOOLS'},
  {id:'legal',icon:'ti-scale',label:'Legal Alerts'},
  {id:'profile',icon:'ti-user',label:'Profile'},
  {id:'instructions',icon:'ti-book',label:'Instructions'},
  {id:'resources',icon:'ti-link',label:'Resources'},
  {id:'settings',icon:'ti-settings',label:'Settings'}
];

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='<div class="logo-wrap"><span>Catcher.AI</span></div><div id="nav-list">';
  NAV.forEach(n=>{
    if(n.section){h+=`<div class="nav-section">${n.section}</div>`;return;}
    h+=`<button class="nav-item${S.view===n.id?' active':''}" data-view="${n.id}"><i class="${n.icon}"></i>${n.label}</button>`;
  });
  h+='</div><div class="sidebar-footer">Catcher.AI &copy; 2025<br/><a href="index.html">Home</a></div>';
  sb.innerHTML=h;
  sb.querySelectorAll('.nav-item').forEach(btn=>{
    btn.onclick=()=>{S.view=btn.dataset.view;render();};
  });
}

function renderTopbar(){
  const tb=document.getElementById('topbar');
  const titles={dashboard:'Dashboard',analysis:'Credit Analysis',disputes:'Dispute Manager',letters:'Letter Center',legal:'Legal Alerts',profile:'Your Profile',instructions:'How to Use',resources:'Resources',settings:'Settings'};
  tb.innerHTML=`<div id="tb-title">${titles[S.view]||'Catcher.AI'}</div><div id="tb-actions"><button class="btn btn-sm btn-secondary" onclick="window.cai.auth.signOut()"><i class="ti ti-logout"></i> Sign Out</button></div>`;
}


// ─── RENDER ROUTER ───────────────────────────────────────────────────────────
function render(){
  renderSidebar();
  renderTopbar();
  const c=document.getElementById('content');
  switch(S.view){
    case'dashboard':c.innerHTML=pageDashboard();break;
    case'analysis':c.innerHTML=pageAnalysis();break;
    case'disputes':c.innerHTML=pageDisputes();break;
    case'letters':c.innerHTML=pageLetters();break;
    case'legal':c.innerHTML=pageLegal();break;
    case'profile':c.innerHTML=pageProfile();break;
    case'instructions':c.innerHTML=pageInstructions();break;
    case'resources':c.innerHTML=pageResources();break;
    case'settings':c.innerHTML=pageSettings();break;
    default:c.innerHTML=pageDashboard();
  }
  bindEvents();
}

// ─── PAGE: DASHBOARD ─────────────────────────────────────────────────────────
function pageDashboard(){
  const numDisputes=S.disputes.length;
  const numLetters=S.letters.length;
  const numMailed=S.letters.filter(l=>l.mailed).length;
  const latestScore=S.scores.length?S.scores[S.scores.length-1].score:'—';
  let h=`<div class="page-header"><div><div class="page-title">Dashboard</div><div class="page-sub">Overview of your credit repair progress</div></div></div>`;
  h+=`<div class="grid-3">`;
  h+=`<div class="card stat-card"><div class="stat-num">${latestScore}</div><div class="stat-label">Latest Score</div></div>`;
  h+=`<div class="card stat-card"><div class="stat-num">${numDisputes}</div><div class="stat-label">Active Disputes</div></div>`;
  h+=`<div class="card stat-card"><div class="stat-num">${numMailed}</div><div class="stat-label">Letters Mailed</div></div>`;
  h+=`</div>`;
  // Score history
  h+=`<div class="card"><div class="card-title">Score History</div>`;
  if(S.scores.length){
    h+=`<div class="table-wrap"><table><tr><th>Date</th><th>Score</th><th></th></tr>`;
    S.scores.forEach(s=>{
      const d=s.recorded_at?new Date(s.recorded_at).toLocaleDateString():'—';
      h+=`<tr><td>${d}</td><td><strong>${s.score}</strong></td><td><button class="btn btn-sm btn-danger" data-del-score="${s.id}">Delete</button></td></tr>`;
    });
    h+=`</table></div>`;
  }else{
    h+=`<p style="color:var(--text2);font-size:13px">No scores recorded yet.</p>`;
  }
  h+=`<div class="mt-12 form-row"><input class="input" id="new-score" type="number" min="300" max="850" placeholder="Enter score (300-850)"/><button class="btn btn-primary" id="add-score-btn">Add Score</button></div></div>`;
  // Recent activity
  h+=`<div class="card"><div class="card-title">Recent Disputes</div>`;
  if(S.disputes.length){
    h+=`<div class="table-wrap"><table><tr><th>Creditor</th><th>Bureau</th><th>Status</th><th>Created</th></tr>`;
    S.disputes.slice(0,5).forEach(d=>{
      const dt=d.created_at?new Date(d.created_at).toLocaleDateString():'—';
      const badge=d.status==='resolved'?'badge-resolved':d.status==='sent'?'badge-blue':'badge-yellow';
      h+=`<tr><td>${d.creditor||'—'}</td><td>${d.bureau||'—'}</td><td><span class="badge ${badge}">${d.status||'pending'}</span></td><td>${dt}</td></tr>`;
    });
    h+=`</table></div>`;
  }else{
    h+=`<p style="color:var(--text2);font-size:13px">No disputes yet. Upload a credit report to get started.</p>`;
  }
  h+=`</div>`;
  return h;
}


// ─── PAGE: ANALYSIS ──────────────────────────────────────────────────────────
function pageAnalysis(){
  let h=`<div class="page-header"><div><div class="page-title">Credit Analysis</div><div class="page-sub">Upload a credit report PDF for AI-powered analysis</div></div></div>`;
  // Upload zone
  h+=`<div class="card"><div class="card-title"><i class="ti ti-upload"></i> Upload Credit Report</div>`;
  h+=`<div class="upload-zone" id="upload-zone"><i class="ti ti-file-upload" style="font-size:32px;color:var(--text3)"></i><p style="color:var(--text2);margin-top:8px;font-size:13px">Drag & drop a PDF, or click to browse</p><input type="file" id="file-input" accept=".pdf,.txt" style="display:none"/></div>`;
  h+=`<div id="upload-status" class="mt-12" style="font-size:13px;color:var(--text2)"></div></div>`;
  // Past reports
  if(S.reports.length){
    h+=`<div class="card"><div class="card-title">Uploaded Reports</div><div class="table-wrap"><table><tr><th>File</th><th>Uploaded</th><th></th></tr>`;
    S.reports.forEach(r=>{
      const dt=r.created_at?new Date(r.created_at).toLocaleDateString():'—';
      h+=`<tr><td>${r.filename||'report'}</td><td>${dt}</td><td><button class="btn btn-sm btn-primary" data-analyze-report="${r.id}">Analyze</button></td></tr>`;
    });
    h+=`</table></div></div>`;
  }
  // Analysis results
  if(S.analyses.length){
    h+=`<div class="card"><div class="card-title"><i class="ti ti-brain"></i> Analysis Results</div>`;
    S.analyses.forEach(a=>{
      h+=`<div class="card" style="border-color:rgba(49,166,104,.3)"><strong>${a.summary||'Analysis'}</strong>`;
      if(a.items&&a.items.length){
        h+=`<div class="table-wrap mt-12"><table><tr><th>Creditor</th><th>Bureau</th><th>Issue</th><th>Law</th><th></th></tr>`;
        a.items.forEach(it=>{
          h+=`<tr><td>${it.creditor||'—'}</td><td>${it.bureau||'—'}</td><td>${it.issue||it.description||'—'}</td><td style="font-size:11px">${it.law||'—'}</td><td><button class="btn btn-sm btn-primary" data-create-dispute='${JSON.stringify(it).replace(/'/g,"&#39;")}'>Dispute</button></td></tr>`;
        });
        h+=`</table></div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  return h;
}


// ─── PAGE: DISPUTES ──────────────────────────────────────────────────────────
function pageDisputes(){
  let h=`<div class="page-header"><div><div class="page-title">Dispute Manager</div><div class="page-sub">Track and manage all your credit disputes</div></div><button class="btn btn-primary" id="add-dispute-btn"><i class="ti ti-plus"></i> New Dispute</button></div>`;
  if(!S.disputes.length){
    h+=`<div class="empty-state"><i class="ti ti-gavel"></i><div class="empty-title">No Disputes Yet</div><div class="empty-sub">Run an AI analysis on your credit report, or add a dispute manually.</div></div>`;
    return h;
  }
  h+=`<div class="table-wrap"><table><tr><th>Creditor</th><th>Bureau</th><th>Issue</th><th>Status</th><th>Created</th><th>Actions</th></tr>`;
  S.disputes.forEach(d=>{
    const dt=d.created_at?new Date(d.created_at).toLocaleDateString():'—';
    const badge=d.status==='resolved'?'badge-resolved':d.status==='sent'?'badge-blue':d.status==='escalated'?'badge-high':'badge-yellow';
    h+=`<tr><td>${d.creditor||'—'}</td><td>${d.bureau||'—'}</td><td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.issue||'—'}</td><td><span class="badge ${badge}">${d.status||'pending'}</span></td><td>${dt}</td>`;
    h+=`<td><button class="btn btn-sm btn-secondary" data-gen-letter="${d.id}">Generate Letter</button> <button class="btn btn-sm btn-secondary" data-edit-dispute="${d.id}">Edit</button> <button class="btn btn-sm btn-danger" data-del-dispute="${d.id}">Del</button></td></tr>`;
  });
  h+=`</table></div>`;
  return h;
}

// ─── PAGE: LETTERS ───────────────────────────────────────────────────────────
function pageLetters(){
  let h=`<div class="page-header"><div><div class="page-title">Letter Center</div><div class="page-sub">Generated dispute letters and mailing status</div></div></div>`;
  if(!S.letters.length){
    h+=`<div class="empty-state"><i class="ti ti-mail"></i><div class="empty-title">No Letters Yet</div><div class="empty-sub">Generate a letter from the Disputes page to get started.</div></div>`;
    return h;
  }
  S.letters.forEach(l=>{
    const dt=l.created_at?new Date(l.created_at).toLocaleDateString():'—';
    const mailBadge=l.mailed?`<span class="badge badge-green">Mailed</span>`:`<span class="badge badge-yellow">Not Mailed</span>`;
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><strong>${l.creditor||'—'}</strong> — ${l.bureau||'—'} (Round ${l.round||1})</div><div>${mailBadge}</div></div>`;
    h+=`<pre style="max-height:180px;overflow-y:auto;padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:12px">${escHtml(l.text||'')}</pre>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
    if(!l.mailed) h+=`<button class="btn btn-sm btn-blue" data-mail-letter="${l.id}"><i class="ti ti-send"></i> Mail via USPS</button>`;
    if(l.tracking_id) h+=`<span style="font-size:12px;color:var(--text2)">Tracking: ${l.tracking_id}</span>`;
    h+=`<button class="btn btn-sm btn-secondary" data-copy-letter="${l.id}"><i class="ti ti-copy"></i> Copy</button>`;
    h+=`</div></div>`;
  });
  return h;
}

// ─── FILE HANDLING (PDF/TXT upload) ──────────────────────────────────────────
async function handleFile(file){
  if(!file)return;
  const status=document.getElementById('upload-status');
  if(status) status.textContent='Processing '+file.name+'...';
  try{
    let text='';
    if(file.type==='application/pdf'){
      text=await extractPdfText(file);
    }else{
      text=await file.text();
    }
    if(!text||text.length<50){
      notify('Could not extract enough text from file','error');
      if(status) status.textContent='';
      return;
    }
    // Save report to Supabase
    const report=await window.cai.db.reports.create(file.name,text.slice(0,50000));
    S.reports=await window.cai.db.reports.list();
    notify('Report uploaded: '+file.name);
    if(status) status.textContent='Upload complete. Click "Analyze" to run AI analysis.';
    render();
  }catch(e){
    notify('Upload failed: '+e.message,'error');
    if(status) status.textContent='';
  }
}

async function extractPdfText(file){
  const arrayBuffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(item=>item.str).join(' ')+'\n';
  }
  return text;
}

// ─── ANALYZE REPORT (call Edge Function) ─────────────────────────────────────
async function analyzeReport(reportId){
  notify('Starting AI analysis... this may take 30-60 seconds','warning');
  try{
    const report=await window.cai.db.reports.get(reportId);
    if(!report||!report.extracted_text){notify('Report text not found','error');return;}
    const result=await window.cai.api.analyze({type:'analyze',reportText:report.extracted_text});
    // Save analysis to DB
    await window.cai.db.analyses.create(reportId,result.summary||'Analysis complete',result.items||[]);
    S.analyses=await window.cai.db.analyses.list();
    notify('Analysis complete!');
    render();
  }catch(e){
    notify('Analysis failed: '+e.message,'error');
  }
}

function showLetterModal(disputeId){
  const dispute=S.disputes.find(d=>d.id===disputeId);
  if(!dispute){notify('Dispute not found','error');return;}
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="overlay" id="letter-overlay"><div class="modal">

  document.getElementById('letter-overlay').onclick=e=>{if(e.target.id==='letter-overlay')root.innerHTML='';};
  document.getElementById('ml-gen').onclick=async()=>{
    const round=parseInt(document.getElementById('ml-round').value);
    const statusEl=document.getElementById('ml-status');
    statusEl.textContent='Generating letter... please wait (30-60 seconds)';
    document.getElementById('ml-gen').disabled=true;
    try{
      const profileJson=JSON.stringify({

          issue:dispute.issue||'',

        profileJson:profileJson
      });
      const letterText=result.text||result.letter||'';
      if(!letterText){notify('No letter text returned','error');root.innerHTML='';return;}
      // Save letter
      await window.cai.db.letters.create({
        dispute_id:dispute.id,
        creditor:dispute.creditor,
        bureau:dispute.bureau,
        round:round,
        text:letterText,
        mailed:false
      });
      // Update dispute status to sent
      await window.cai.db.disputes.update(dispute.id,{status:'sent'});
      S.letters=await window.cai.db.letters.list();
      S.disputes=await window.cai.db.disputes.list();
      notify('Letter generated!');
      root.innerHTML='';
      S.view='letters';
      render();
    }catch(e){
      statusEl.textContent='Error: '+e.message;
      document.getElementById('ml-gen').disabled=false;
      notify('Letter generation failed: '+e.message,'error');
    }
  };
}


// ─── MODAL: MAIL LETTER ──────────────────────────────────────────────────────
function showMailModal(letterId){
  const letter=S.letters.find(l=>l.id===letterId);
  if(!letter){notify('Letter not found','error');return;}
  const bureau=BUREAUS[letter.bureau]||BUREAUS.Equifax;
  const root=document.getElementById('modal-root');
  // Pre-fill from address from profile or saved addresses
  const prof=S.profile;
  const fromName=prof.full_name||prof.name||'';
  const fromStreet=prof.address||'';
  const fromCity=prof.city||'';
  const fromState=prof.state||'';
  const fromZip=prof.zip||'';

  root.innerHTML=`<div class="overlay" id="mail-overlay"><div class="modal">
    <div class="modal-title"><i class="ti ti-send"></i> Mail Letter via USPS</div>
    <div class="modal-sub">Send via USPS Certified Mail with Return Receipt</div>
    <div class="card-title" style="margin-top:12px">From (Your Address)</div>
    <div class="form-row"><div><label class="label">Name</label><input class="input" id="mm-from-name" value="${escAttr(fromName)}"/></div></div>
    <div class="mb-12"><label class="label">Street</label><input class="input" id="mm-from-street" value="${escAttr(fromStreet)}"/></div>
    <div class="form-row"><div><label class="label">City</label><input class="input" id="mm-from-city" value="${escAttr(fromCity)}"/></div><div><label class="label">State</label><input class="input" id="mm-from-state" value="${escAttr(fromState)}" maxlength="2"/></div><div><label class="label">ZIP</label><input class="input" id="mm-from-zip" value="${escAttr(fromZip)}" maxlength="10"/></div></div>
    <div class="card-title" style="margin-top:16px">To (Bureau Address)</div>
    <div class="form-row"><div><label class="label">Name</label><input class="input" id="mm-to-name" value="${escAttr(bureau.name)}"/></div></div>
    <div class="mb-12"><label class="label">Street</label><input class="input" id="mm-to-street" value="${escAttr(bureau.street)}"/></div>
    <div class="form-row"><div><label class="label">City</label><input class="input" id="mm-to-city" value="${escAttr(bureau.city)}"/></div><div><label class="label">State</label><input class="input" id="mm-to-state" value="${escAttr(bureau.state)}" maxlength="2"/></div><div><label class="label">ZIP</label><input class="input" id="mm-to-zip" value="${escAttr(bureau.zip)}" maxlength="10"/></div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-secondary" id="mm-cancel">Cancel</button><button class="btn btn-blue" id="mm-send"><i class="ti ti-send"></i> Send Certified Mail</button></div>
    <div id="mm-status" class="mt-12" style="font-size:13px;color:var(--text2)"></div>
  </div></div>`;
  document.getElementById('mm-cancel').onclick=()=>{root.innerHTML='';};
  document.getElementById('mail-overlay').onclick=e=>{if(e.target.id==='mail-overlay')root.innerHTML='';};
  document.getElementById('mm-send').onclick=async()=>{
    const from={
      name:document.getElementById('mm-from-name').value,
      street:document.getElementById('mm-from-street').value,
      city:document.getElementById('mm-from-city').value,
      state:document.getElementById('mm-from-state').value,
      zip:document.getElementById('mm-from-zip').value
    };
    const to={
      name:document.getElementById('mm-to-name').value,
      street:document.getElementById('mm-to-street').value,
      city:document.getElementById('mm-to-city').value,
      state:document.getElementById('mm-to-state').value,
      zip:document.getElementById('mm-to-zip').value
    };
    if(!from.name||!from.street||!from.city||!from.state||!from.zip){notify('Complete your return address','error');return;}
    if(!to.name||!to.street||!to.city||!to.state||!to.zip){notify('Complete the recipient address','error');return;}
    const statusEl=document.getElementById('mm-status');
    statusEl.textContent='Sending...';
    document.getElementById('mm-send').disabled=true;
    try{
      const result=await window.cai.api.mail({
        letterId:letterId,
        from:from,
        to:to,
        content:letter.text
      });
      // Update local state
      S.letters=await window.cai.db.letters.list();
      notify('Letter mailed! Tracking: '+(result.tracking_id||'pending'));
      root.innerHTML='';
      render();
    }catch(e){
      statusEl.textContent='Error: '+e.message;
      document.getElementById('mm-send').disabled=false;
      notify('Mailing failed: '+e.message,'error');
    }
  };
}


// ─── INITIAL RENDER ──────────────────────────────────────────────────────────
render();

})();
</script>
